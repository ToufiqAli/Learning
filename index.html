<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Request Example</title>
  <style>
:root {
  --primary-color: #2563eb;
  --text-main: #1f2937;
  --text-muted: #6b7280;
  --bg-card: #ffffff;
  --shadow-sm: 0 4px 6px -1px rgb(0 0 0 / 0.1);
  --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
}

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background-color: #f8fafc;
  margin: 0;
  padding: 40px 20px;
}

.page-wrapper {
  max-width: 1200px;
  margin: 0 auto;
}

.page-title {
  text-align: center;
  color: var(--text-main);
  margin-bottom: 40px;
  font-weight: 700;
}

/* Responsive Grid Engine */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 30px;
}

/* Individual Card Styling */
.product-card {
  background: var(--bg-card);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  display: flex;
  flex-direction: column;
}

.product-card:hover {
  transform: translateY(-8px);
  box-shadow: var(--shadow-lg);
}

.image-wrapper {
  width: 100%;
  height: 240px;
  background-color: #f1f5f9;
  position: relative;
  overflow: hidden;
}

.image-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}

.product-card:hover .image-wrapper img {
  transform: scale(1.06);
}

.product-info {
  padding: 20px;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
}

.product-title {
  font-size: 1.15rem;
  color: var(--text-main);
  margin: 0 0 16px 0;
  font-weight: 600;
  line-height: 1.4;
}

.product-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: auto;
}

.product-price {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--primary-color);
}

.buy-btn {
  background-color: var(--primary-color);
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s ease;
}

.buy-btn:hover {
  background-color: #1d4ed8;
}

/* Error/Empty UI Handling */
.error-card {
  grid-column: 1 / -1;
  text-align: center;
  background: #fef2f2;
  border: 1px solid #fee2e2;
  padding: 24px;
  border-radius: 12px;
}

  </style>
</head>

<body>
<button id="fetch-btn">Load</button>
<div class="page-wrapper">
  <h1 class="page-title">Our Exclusive Collection</h1>
  <div id="products-container" class="products-grid">
     <!-- JavaScript will inject cards here automatically -->
  </div>
</div>

</body>
 <script>
    // 1. Select the HTML elements we need to interact with
    const button = document.getElementById('fetch-btn');
   
    // 2. Define the asynchronous API function
   async function loadUserData() {
  const url = `http://localhost:5000/products/`; 
  const container = document.getElementById('products-container');
  
  try {
    const response = await fetch(url, {
        method: 'GET',
        headers: { 'Content-Type': 'application/json' }
    });
  
    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }

    const result = await response.json();
    
    // Fallback array checks to prevent application crashes
    const productsList = result.products || result.Products || result;
    
    if (!Array.isArray(productsList) || productsList.length === 0) {
        container.innerHTML = `<p class="empty-msg">No products found at this moment.</p>`;
        return;
    }

    // Generate HTML for all products cleanly using .map()
    container.innerHTML = productsList.map(product => {
        // Fallback placeholder image if no images exist
        let imageUrl = "https://unsplash.com";
        
        if (product.images && product.images.length > 0) {
            // Try to find the primary image, otherwise grab the first one available
            const primaryImg = product.images.find(img => img.isPrimary === true);
            imageUrl = primaryImg ? primaryImg.url : product.images[0].url;
        }

        return `
          <div class="product-card">
            <div class="image-wrapper">
              <img src="${imageUrl}" alt="${product.name || 'Product Image'}" loading="lazy" />
            </div>
            <div class="product-info">
              <h3 class="product-title">${product.name || 'Untitled Product'}</h3>
              <div class="product-footer">
                <span class="product-price">₹${product.costPrice || '0.00'}</span>
                <button class="buy-btn">View Details</button>
              </div>
            </div>
          </div>
        `;
    }).join(''); // Join array into a single clean HTML string

  } catch (error) {
    container.innerHTML = `
      <div class="error-card">
        <p class="error-msg">⚠️ Failed to load products. Please try again later.</p>
        <small>${error.message}</small>
      </div>
    `;
  }
}

    // 4. Attach the event listener to trigger the function on click
    button.addEventListener('click', loadUserData);
  </script>
</html>
